name: ipstack_videocall_example
description: IPSTACK VideoCall SDK Example App with offline push support.
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_ipstack_videocall:
    path: ../
  firebase_core: ^3.12.0
  firebase_messaging: ^15.1.6
  flutter_callkit_incoming: ^3.0.0
  livekit_client: ^2.6.5
  permission_handler: ^11.0.0
  audioplayers: ^6.0.0
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/ringtone.mp3
